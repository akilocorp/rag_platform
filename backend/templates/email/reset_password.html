<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Your Actr Lab Password</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #ffffff; color: #222222; -webkit-font-smoothing: antialiased; }
        .container { max-width: 560px; margin: 0 auto; padding: 48px 24px; }
        .card { background-color: #ffffff; padding: 32px 40px 40px; border-radius: 20px; border: 1px solid #eaeaea; }
        .header { text-align: left; margin-bottom: 24px; }
        .logo { display: inline-block; height: 36px; width: auto; vertical-align: middle; }
        .hero { text-align: center; margin: 8px 0 24px; }
        .hero img { display: block; margin: 0 auto; max-width: 140px; height: auto; }
        .hook { color: #222222; font-size: 26px; line-height: 32px; font-weight: 800; letter-spacing: -0.01em; margin: 8px 0 16px; text-align: center; }
        .hook .accent { color: #FA6C43; }
        .body-text { color: #555555; font-size: 15px; line-height: 22px; margin: 0 0 28px; text-align: center; }
        .cta-row { text-align: center; }
        .btn { display: inline-block; background-color: #FA6C43; color: #ffffff !important; padding: 14px 36px; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 15px; letter-spacing: 0.01em; }
        .btn:hover { background-color: #E55B34; }
        .ignore { color: #999999; font-size: 12px; line-height: 18px; margin: 36px 0 0; padding-top: 24px; border-top: 1px solid #f0f0f0; text-align: center; }
        .footer { margin-top: 20px; font-size: 11px; color: #b8b8b8; text-align: center; letter-spacing: 0.04em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <img src="{{ logo_url }}" alt="ACTR Lab" class="logo" />
            </div>
            <div class="hero">
                <img src="{{ illustration_url }}" alt="" />
            </div>
            <p class="hook">Oh hey &mdash;<br/>did you mean to <span class="accent">reset your password?</span></p>
            <p class="body-text">Tap the button below and we&rsquo;ll get you a fresh one. This link is good for the next hour.</p>

            <div class="cta-row">
                <a href="{{ reset_url }}" class="btn">Reset My Password</a>
            </div>

            <p class="ignore">If this wasn&rsquo;t you, just ignore this email &mdash; your password stays the same.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 ACTR Lab</p>
        </div>
    </div>
</body>
</html>
